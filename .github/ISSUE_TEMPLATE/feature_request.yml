name: Verbesserung vorschlagen
description: Schlage eine neue Funktion oder Verbesserung vor.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Welches Nutzerproblem soll gelöst werden?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Vorschlag
      description: Was soll Sparkompass anders oder zusätzlich können?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - CLI
        - MCP
        - Plugin
        - Hook
        - ContextPack
        - Experiment/Usage
        - Router/GatePath
        - Dokumentation
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Messbares Signal
      description: Welche lokale Messung, Usage-Evidenz oder Qualitätsprüfung sollte zeigen, dass es besser wird?
