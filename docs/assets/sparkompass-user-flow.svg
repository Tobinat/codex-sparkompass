<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Sparkompass Ablauf</title>
  <desc id="desc">Ablaufdiagramm vom Nutzerziel bis zur Codex-Übergabe mit Nachlade- und Messschritt.</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="94" font-size="34" font-weight="700" fill="#111827">Wann passiert was?</text>
    <text x="72" y="130" font-size="18" fill="#4b5563">Der kleine Kontext wird geplant, geprüft und erst dann an Codex übergeben.</text>

    <line x1="118" y1="238" x2="1162" y2="238" stroke="#cbd5e1" stroke-width="3"/>

    <g>
      <rect x="82" y="188" width="168" height="100" rx="8" fill="#f8fafc" stroke="#0f172a"/>
      <text x="112" y="226" font-size="22" font-weight="700" fill="#111827">1. Ziel</text>
      <text x="112" y="256" font-size="15" fill="#475569">Aufgabe, Dateien,</text>
      <text x="112" y="278" font-size="15" fill="#475569">Done-Kriterium</text>
    </g>

    <g>
      <rect x="282" y="188" width="168" height="100" rx="8" fill="#f8fafc" stroke="#2563eb"/>
      <text x="312" y="226" font-size="22" font-weight="700" fill="#1e3a8a">2. Plan</text>
      <text x="312" y="256" font-size="15" fill="#475569">Audit, Inventory,</text>
      <text x="312" y="278" font-size="15" fill="#475569">ContextPlan</text>
    </g>

    <g>
      <rect x="482" y="188" width="168" height="100" rx="8" fill="#f8fafc" stroke="#16a34a"/>
      <text x="512" y="226" font-size="22" font-weight="700" fill="#14532d">3. Pack</text>
      <text x="512" y="256" font-size="15" fill="#475569">ContextPack,</text>
      <text x="512" y="278" font-size="15" fill="#475569">Handoff</text>
    </g>

    <g>
      <rect x="682" y="188" width="168" height="100" rx="8" fill="#f8fafc" stroke="#d97706"/>
      <text x="712" y="226" font-size="22" font-weight="700" fill="#78350f">4. Prüfen</text>
      <text x="712" y="256" font-size="15" fill="#475569">Oracle, Evidence,</text>
      <text x="712" y="278" font-size="15" fill="#475569">Ablation</text>
    </g>

    <g>
      <rect x="882" y="188" width="168" height="100" rx="8" fill="#f8fafc" stroke="#64748b"/>
      <text x="912" y="226" font-size="22" font-weight="700" fill="#111827">5. Nutzen</text>
      <text x="912" y="256" font-size="15" fill="#475569">enger Start,</text>
      <text x="912" y="278" font-size="15" fill="#475569">Nachladen</text>
    </g>

    <g>
      <rect x="1082" y="188" width="136" height="100" rx="8" fill="#111827"/>
      <text x="1112" y="226" font-size="22" font-weight="700" fill="#ffffff">6. Messen</text>
      <text x="1112" y="256" font-size="15" fill="#d1d5db">Usage,</text>
      <text x="1112" y="278" font-size="15" fill="#d1d5db">Task</text>
    </g>

    <path d="M250 238 H282" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M450 238 H482" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M650 238 H682" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M850 238 H882" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M1050 238 H1082" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="92" y="388" width="500" height="134" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
    <text x="124" y="430" font-size="22" font-weight="700" fill="#111827">Live-Nutzung</text>
    <text x="124" y="464" font-size="16" fill="#475569">`audit`, `recommend`, `pack` und `handoff` verkleinern die Übergabe.</text>
    <text x="124" y="492" font-size="16" fill="#475569">MCP lädt Originalstellen nur nach, wenn sie wirklich gebraucht werden.</text>

    <rect x="688" y="388" width="500" height="134" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
    <text x="720" y="430" font-size="22" font-weight="700" fill="#111827">Beweis-Labor</text>
    <text x="720" y="464" font-size="16" fill="#475569">`codex-usage`, `experiment run`, `TaskOutcome` und Router prüfen,</text>
    <text x="720" y="492" font-size="16" fill="#475569">ob weniger Kontext auch gleich gute Ergebnisse trägt.</text>

    <text x="92" y="620" font-size="15" fill="#64748b">Der Hook ist nur ein lokaler Hinweisgeber. Er ersetzt den Prompt nicht automatisch und blockiert keine Aufgabe.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
