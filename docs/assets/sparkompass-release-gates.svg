<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Sparkompass Release-Gates</title>
  <desc id="desc">Release-Gates vom Alpha-Stand bis zum noch offenen End-to-End-Nachweis.</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="94" font-size="34" font-weight="700" fill="#111827">Release-Gates</text>
    <text x="72" y="130" font-size="18" fill="#4b5563">Was belegt ist und was für Stable noch fehlt.</text>

    <rect x="92" y="190" width="322" height="158" rx="8" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
    <text x="124" y="236" font-size="22" font-weight="700" fill="#1e3a8a">1. Alpha</text>
    <text x="124" y="272" font-size="16" fill="#475569">Tests, Dogfood, Benchmark,</text>
    <text x="124" y="300" font-size="16" fill="#475569">Package- und Plugin-Smoke</text>
    <text x="124" y="326" font-size="16" font-weight="700" fill="#14532d">erreicht</text>

    <rect x="478" y="190" width="322" height="158" rx="8" fill="#f8fafc" stroke="#16a34a" stroke-width="2"/>
    <text x="510" y="236" font-size="22" font-weight="700" fill="#14532d">2. Usage-Beleg</text>
    <text x="510" y="272" font-size="16" fill="#475569">lokaler Codex JSONL A/B-Lauf</text>
    <text x="510" y="300" font-size="16" fill="#475569">21% Gesamt-Ersparnis</text>
    <text x="510" y="326" font-size="16" font-weight="700" fill="#14532d">erreicht</text>

    <rect x="864" y="190" width="322" height="158" rx="8" fill="#f8fafc" stroke="#d97706" stroke-width="2"/>
    <text x="896" y="236" font-size="22" font-weight="700" fill="#78350f">3. Stable</text>
    <text x="896" y="272" font-size="16" fill="#475569">mehrere echte Aufgaben,</text>
    <text x="896" y="300" font-size="16" fill="#475569">gleiche oder bessere Qualität</text>
    <text x="896" y="326" font-size="16" font-weight="700" fill="#92400e">noch offen</text>

    <path d="M414 269 H478" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M800 269 H864" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="92" y="430" width="1094" height="110" rx="8" fill="#111827"/>
    <text x="124" y="474" font-size="22" font-weight="700" fill="#ffffff">Nächstes Gate: verified-end-to-end-noninferior</text>
    <text x="124" y="510" font-size="16" fill="#d1d5db">Benötigt gepaarte Raw/Compact-Läufe, offizielle Usage-JSONL, TaskOutcome-Ledger und gleich gute Erfolgsrate.</text>

    <rect x="92" y="588" width="1094" height="48" rx="8" fill="#f8fafc" stroke="#d8dee8"/>
    <text x="124" y="618" font-size="15" fill="#64748b">Alpha ist veröffentlichbar als Technical Preview, aber noch keine Stable-Version und keine offizielle Codex-Integration.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
