<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex Sparkompass Struktur</title>
  <desc id="desc">Ruhiges Architekturdiagramm mit den Schichten CLI, Context Control, MCP Plugin und Evidenz.</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="56" y="52" width="1168" height="616" fill="#f8fafc" stroke="#d8dee8"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="118" font-size="34" font-weight="700" fill="#111827">Codex Sparkompass</text>
    <text x="96" y="152" font-size="18" fill="#4b5563">Lokale Context-Control-Plane für sparsamere, belegbare Codex-Workflows</text>

    <line x1="118" y1="252" x2="1148" y2="252" stroke="#94a3b8" stroke-width="2"/>
    <line x1="118" y1="448" x2="1148" y2="448" stroke="#94a3b8" stroke-width="2"/>

    <g>
      <text x="118" y="225" font-size="14" font-weight="700" fill="#475569">EINGABE</text>
      <rect x="118" y="272" width="210" height="118" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <text x="142" y="312" font-size="24" font-weight="700" fill="#1e3a8a">CLI</text>
      <text x="142" y="344" font-size="16" fill="#334155">audit, recommend</text>
      <text x="142" y="370" font-size="16" fill="#334155">pack, handoff</text>
    </g>

    <g>
      <text x="390" y="225" font-size="14" font-weight="700" fill="#475569">PLANUNG</text>
      <rect x="390" y="272" width="230" height="118" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
      <text x="414" y="312" font-size="24" font-weight="700" fill="#14532d">Context Control</text>
      <text x="414" y="344" font-size="16" fill="#334155">Plan, BOM, Evidence</text>
      <text x="414" y="370" font-size="16" fill="#334155">Ablation, Slimming</text>
    </g>

    <g>
      <text x="682" y="225" font-size="14" font-weight="700" fill="#475569">NACHLADEN</text>
      <rect x="682" y="272" width="230" height="118" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
      <text x="706" y="312" font-size="24" font-weight="700" fill="#78350f">MCP und Plugin</text>
      <text x="706" y="344" font-size="16" fill="#334155">Tools, Skill, Hook</text>
      <text x="706" y="370" font-size="16" fill="#334155">Originalstellen bei Bedarf</text>
    </g>

    <g>
      <text x="974" y="225" font-size="14" font-weight="700" fill="#475569">BELEG</text>
      <rect x="974" y="272" width="174" height="118" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
      <text x="998" y="312" font-size="24" font-weight="700" fill="#111827">Evidenz</text>
      <text x="998" y="344" font-size="16" fill="#334155">Usage, Tasks</text>
      <text x="998" y="370" font-size="16" fill="#334155">Router, Gates</text>
    </g>

    <path d="M328 331 H390" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M620 331 H682" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M912 331 H974" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

    <g>
      <rect x="118" y="490" width="220" height="96" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="142" y="526" font-size="18" font-weight="700" fill="#111827">Sparen</text>
      <text x="142" y="556" font-size="15" fill="#475569">ContextPack, Handoff</text>
    </g>
    <g>
      <rect x="362" y="490" width="220" height="96" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="386" y="526" font-size="18" font-weight="700" fill="#111827">Qualität</text>
      <text x="386" y="556" font-size="15" fill="#475569">Oracle, Shadow, Task</text>
    </g>
    <g>
      <rect x="606" y="490" width="220" height="96" rx="8" fill="#ffffff" stroke="#d8dee8"/>
      <text x="630" y="526" font-size="18" font-weight="700" fill="#111827">Messen</text>
      <text x="630" y="556" font-size="15" fill="#475569">Codex JSONL, Manifest</text>
    </g>
    <g>
      <rect x="850" y="490" width="298" height="96" rx="8" fill="#111827"/>
      <text x="874" y="526" font-size="18" font-weight="700" fill="#ffffff">Entscheiden</text>
      <text x="874" y="556" font-size="15" fill="#d1d5db">bypass, compact, lazy oder full</text>
    </g>

    <text x="96" y="632" font-size="15" fill="#64748b">Alpha-Signal: lokale Tests, Package-Smoke, Plugin-Smoke und GatePath sind vorbereitet. Keine offizielle Codex-Integration.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
